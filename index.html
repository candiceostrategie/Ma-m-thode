ockup-body { grid-template-columns:1fr; }\n  .mockup-sidebar { display:none; }\n  .mockup-metrics { grid-template-columns:1fr 1fr; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <div class=\"hero-bg\" id=\"heroBg\"><\u002Fdiv>\n  <div class=\"hero-overlay\"><\u002Fdiv>\n\n  <div class=\"hero-content\">\n    <span class=\"hero-eyebrow\">Candice Obadia · Stratégie &amp; Opérations restaurant<\u002Fspan>\n    <h1>\n      <span>Tu développes ton restaurant.<\u002Fspan>\n      Ou ton groupe.\n    <\u002Fh1>\n    <div class=\"hero-bottom\">\n      <p class=\"hero-body\">\n        À un certain niveau, la croissance ne se joue plus sur l'exécution.<br>\n        <strong>Elle se joue sur la structure.<\u002Fstrong><br><br>\n        Je t'aide à structurer, piloter et développer — sans désorganisation ni perte de contrôle.\n      <\u002Fp>\n      <div class=\"hero-cta-wrap\">\n        <a href=\"https://calendly.com/candiceo-strategie/decouverte\" target=\"_blank\" class=\"cta-primary\">\n          Réserver un appel stratégique\n        <\u002Fa>\n        <p class=\"hero-sub\">30 minutes · Sans engagement · Pour voir si c'est pertinent pour ton niveau de développement<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hero-scroll\">\n    <div class=\"hero-scroll-line\"><\u002Fdiv>\n    <span class=\"hero-scroll-label\">Scroll<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MARQUEE -->\n<div class=\"marquee-section\">\n  <div class=\"marquee-track\" aria-hidden=\"true\">\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Structurer<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Piloter<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Développer<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Décider<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Structurer<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Piloter<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Développer<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Décider<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Structurer<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Piloter<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Développer<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"marquee-item\"><span class=\"marquee-word\">Décider<\u002Fspan><div class=\"marquee-dot\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CE QU'ON CONSTRUIT -->\n<section class=\"projection-section\">\n  <div class=\"projection-text\">\n    <div>\n      <span class=\"section-label reveal\">Ce qu'on construit ensemble<\u002Fspan>\n      <h2 class=\"big-title projection-title reveal d1\">Que tu sois à la tête<br>d'un restaurant<br>ou d'un groupe<br><em>en développement&nbsp;<\u002Fem><\u002Fh2>\n      <p class=\"projection-intro reveal d2\">Le point commun reste le même : la structure ne suit plus toujours la croissance.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"projection-cards reveal d3\">\n      <div class=\"proj-card\">\n        <span class=\"proj-card-num\">01<\u002Fspan>\n        <div class=\"proj-card-content\">\n          <h3>Ta croissance devient difficile à structurer<\u002Fh3>\n          <p>On remet de la clarté pour que ton développement reste maîtrisé.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-card\">\n        <span class=\"proj-card-num\">02<\u002Fspan>\n        <div class=\"proj-card-content\">\n          <h3>Tes établissements ne tournent pas toujours ensemble<\u002Fh3>\n          <p>On structure une vision globale : chiffres, organisation, pilotage.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-card\">\n        <span class=\"proj-card-num\">03<\u002Fspan>\n        <div class=\"proj-card-content\">\n          <h3>Tes chiffres existent, mais la lecture est partielle<\u002Fh3>\n          <p>On met en place un système de pilotage simple et lisible.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-card\">\n        <span class=\"proj-card-num\">04<\u002Fspan>\n        <div class=\"proj-card-content\">\n          <h3>Tu portes encore trop de décisions seul<\u002Fh3>\n          <p>Tu as un bras droit pour structurer, arbitrer et avancer sans être partout.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"projection-image reveal\">\n    <img src=\"821ed97d-0f88-4dd4-9a79-e89519e15891\" alt=\"Consultation stratégique\">\n    <div class=\"projection-image-overlay\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MON APPROCHE -->\n<section class=\"approche-section grain\" style=\"position:relative;\">\n  <div class=\"approche-inner\">\n    <div class=\"approche-left-sticky\">\n      <span class=\"section-label section-label-dim reveal\">Mon approche<\u002Fspan>\n      <h2 class=\"big-title big-title-light approche-title reveal d1\">Pas une<br>consultante<br>externe<br><em>Un bras droit<br>opérationnel<\u002Fem><\u002Fh2>\n      <div class=\"candice-portrait reveal d2\">\n        <img src=\"3396c5dc-606d-4ffa-93e3-9ed1500d3bba\" alt=\"Candice Obadia\" class=\"candice-portrait-img\">\n        <div>\n          <div class=\"candice-name\">Candice Obadia<\u002Fdiv>\n          <div class=\"candice-title\">Stratégie &amp; Opérations restaurant<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <p class=\"approche-body reveal\">J'interviens à 3 niveaux, parce qu'on ne structure pas un restaurant depuis un ordinateur, et on ne pilote pas uniquement sur le terrain.<\u002Fp>\n\n      <div class=\"approche-levels reveal d1\">\n        <div class=\"level-item\">\n          <span class=\"level-arrow\">→<\u002Fspan>\n          <p><strong>Sur le terrain<\u002Fstrong> : pour comprendre la réalité de ton organisation, pas juste ce qu'elle devrait être sur le papier.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"level-item\">\n          <span class=\"level-arrow\">→<\u002Fspan>\n          <p><strong>À distance<\u002Fstrong> : pour structurer, piloter et accompagner les décisions dans la durée.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"level-item\">\n          <span class=\"level-arrow\">→<\u002Fspan>\n          <p><strong>En continu, via le Cockpit<\u002Fstrong> : le système qui relie tout et te donne une vision claire à tout moment.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"approche-divider reveal d2\"><\u002Fdiv>\n      <p class=\"approche-promise reveal d2\">\"Mon travail, c'est de construire la structure qui te permet de piloter ton restaurant et de passer au cap d'après.\"<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PHOTO BREAK — terrain -->\n<div class=\"photo-break\">\n  <img src=\"ffa49c77-95e0-48b7-9bab-9accc140fdff\" alt=\"Sur le terrain\">\n  <div class=\"photo-break-overlay\"><\u002Fdiv>\n  <span class=\"photo-break-caption\">Sur le terrain — avec les équipes, dans le réel<\u002Fspan>\n<\u002Fdiv>\n\n<!-- COMMENT ON TRAVAILLE -->\n<section class=\"process-section\">\n  <div class=\"process-inner\">\n    <div class=\"process-header\">\n      <div>\n        <span class=\"section-label reveal\">Comment on travaille<\u002Fspan>\n        <h2 class=\"big-title process-title reveal d1\">Quatre étapes.<br><em>Du diagnostic<br>au pilotage.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"reveal d2\" style=\"font-size:15px;font-weight:400;line-height:1.9;color:var(--text-muted);\">Une méthode concrète, mise en place pas à pas, terrain et distance mêlés.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"process-steps\">\n      <div class=\"step reveal\">\n        <div class=\"step-num-col\"><div class=\"step-num\">01<\u002Fdiv><\u002Fdiv>\n        <div class=\"step-content\">\n          <h3>Appel découverte<\u002Fh3>\n          <p>On fait le point sur ta situation, ton niveau de structuration et tes objectifs. 30 minutes pour voir si c'est pertinent pour toi, je ne vends rien avant de savoir si je peux vraiment t'aider.<\u002Fp>\n          <span class=\"step-tag\">Gratuit · Sans engagement<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-img\">\n          <img src=\"3253e875-a65f-4780-a52e-dd70dc58ad49\" alt=\"Rencontre\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"step-num-col\"><div class=\"step-num\">02<\u002Fdiv><\u002Fdiv>\n        <div class=\"step-content\">\n          <h3>Analyse terrain + système<\u002Fh3>\n          <p>Je rentre dans ton organisation : terrain ou distance selon ton profil. Je comprends comment ton système fonctionne réellement, pas comment il devrait fonctionner.<\u002Fp>\n          <span class=\"step-tag\">Terrain &amp; visio<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-img\">\n          <img src=\"70108d94-7e4d-4116-855c-8270373857b3\" alt=\"Analyse\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"step-num-col\"><div class=\"step-num\">03<\u002Fdiv><\u002Fdiv>\n        <div class=\"step-content\">\n          <h3>Structuration<\u002Fh3>\n          <p>On met en place les outils, les décisions et les ajustements nécessaires. Pas de rapport qui dort dans un dossier. Du concret, mis en place, suivi dans le temps.<\u002Fp>\n          <span class=\"step-tag\">Action &amp; mise en œuvre<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-img\">\n          <img src=\"3b05e3da-018d-4f6c-8b67-d418f91eb238\" alt=\"Structuration\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"step-num-col\"><div class=\"step-num\">04<\u002Fdiv><\u002Fdiv>\n        <div class=\"step-content\">\n          <h3>Pilotage continu<\u002Fh3>\n          <p>On travaille en visio et via le Cockpit pour maintenir la dynamique de décision. Tu as une vision en temps réel, et quelqu'un dans ton coin pour les arbitrages.<\u002Fp>\n          <span class=\"step-tag\">Cockpit · Visio · Disponibilité<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-img\">\n          <img src=\"425f8760-d564-40ee-b578-fcb777ae5490\" alt=\"Pilotage continu\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- COCKPIT -->\n<section class=\"cockpit-section grain\" style=\"position:relative;\">\n  <div class=\"cockpit-inner\">\n    <div class=\"cockpit-header\">\n      <div>\n        <span class=\"section-label section-label-dim reveal\">Le Cockpit : base du pilotage<\u002Fspan>\n        <h2 class=\"big-title big-title-light cockpit-title reveal d1\">Aujourd'hui,<br>tu pilotes à l'instinct.<br><em>Demain, avec<br>une vision claire.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"reveal d2\">\n        <p class=\"cockpit-desc\">Un outil de pilotage conçu pour la restauration indépendante. Simple, centralisé, taillé pour ton quotidien.<br><br><strong>Tout centralisé. Lisible. Exploitable.<\u002Fstrong> Connecté à tes outils existants pour une vue d'ensemble réelle.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cockpit-mockup reveal\">\n      <div class=\"mockup-bar\">\n        <div class=\"md md-r\"><\u002Fdiv>\n        <div class=\"md md-y\"><\u002Fdiv>\n        <div class=\"md md-g\"><\u002Fdiv>\n        <span class=\"mockup-bar-title\">Cockpit — Vue d'ensemble · Avril 2025<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"mockup-body\">\n        <div class=\"mockup-main\">\n          <div class=\"mockup-metrics\">\n            <div class=\"mockup-metric\">\n              <span class=\"mm-label\">CA ce mois<\u002Fspan>\n              <div class=\"mm-value\">38 420€<\u002Fdiv>\n              <span class=\"mm-delta\">↑ +12% vs N-1<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"mockup-metric\">\n              <span class=\"mm-label\">Ticket moyen<\u002Fspan>\n              <div class=\"mm-value\">42€<\u002Fdiv>\n              <span class=\"mm-delta\">↑ +10€ vs démarrage<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"mockup-metric\">\n              <span class=\"mm-label\">Food cost<\u002Fspan>\n              <div class=\"mm-value\">27.4%<\u002Fdiv>\n              <span class=\"mm-delta\">↓ −3.2 pts<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"mockup-metric\">\n              <span class=\"mm-label\">Masse salariale<\u002Fspan>\n              <div class=\"mm-value\">31.8%<\u002Fdiv>\n              <span class=\"mm-delta\">— stable<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"mockup-metric\">\n              <span class=\"mm-label\">Couverts / jour<\u002Fspan>\n              <div class=\"mm-value\">124<\u002Fdiv>\n              <span class=\"mm-delta\">↑ +18 vs S-4<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"mockup-metric\">\n              <span class=\"mm-label\">Marge brute<\u002Fspan>\n              <div class=\"mm-value\">68.2%<\u002Fdiv>\n              <span class=\"mm-delta\">↑ objectif atteint<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"mockup-chart\">\n            <span class=\"mockup-chart-label\">CA par service — 30 derniers jours<\u002Fspan>\n            <div class=\"mbars\">\n              <div class=\"mbar\" style=\"height:55%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:70%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:48%\"><\u002Fdiv>\n              <div class=\"mbar hi\" style=\"height:85%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:65%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:72%\"><\u002Fdiv>\n              <div class=\"mbar hi\" style=\"height:90%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:60%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:75%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:58%\"><\u002Fdiv>\n              <div class=\"mbar hi\" style=\"height:88%\"><\u002Fdiv>\n              <div class=\"mbar\" style=\"height:68%\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mockup-sidebar\">\n          <div class=\"mockup-sidebar-card\">\n            <span class=\"ms-label\">Objectif CA<\u002Fspan>\n            <div class=\"ms-value\">87%<\u002Fdiv>\n            <div class=\"ms-bar-wrap\"><div class=\"ms-bar-fill\" style=\"width:87%\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"mockup-sidebar-card\">\n            <span class=\"ms-label\">Actions en cours<\u002Fspan>\n            <div class=\"ms-value\">4 / 6<\u002Fdiv>\n            <div class=\"ms-bar-wrap\"><div class=\"ms-bar-fill\" style=\"width:66%\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"mockup-sidebar-card\">\n            <span class=\"ms-label\">Prochain point<\u002Fspan>\n            <div class=\"ms-value\" style=\"font-size:16px\">Vendredi 16h<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"mockup-sidebar-card\">\n            <span class=\"ms-label\">L'Indépendant<\u002Fspan>\n            <div class=\"ms-value\" style=\"font-size:16px;color:rgba(94,210,140,0.8)\">Actif<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cockpit-grid reveal\">\n      <div class=\"cockpit-feat\"><h4>Chiffres<\u002Fh4><p>CA par service, ticket moyen, performance réelle par adresse.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>Équipe<\u002Fh4><p>Planning, masse salariale, organisation et coût réel par service.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>Pilotage<\u002Fh4><p>Objectifs, indicateurs, actions en cours. Tu sais où tu en es.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>Agenda<\u002Fh4><p>CA jour par jour, événements, temps forts. Tout au même endroit.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>Communication<\u002Fh4><p>Stratégie réseaux sociaux, suivi des actions, cohérence de ta com.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>Process<\u002Fh4><p>Tes procédures internes, tes standards, ce qui fait tourner sans toi.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>Sessions &amp; suivi<\u002Fh4><p>Accès à nos échanges, décisions prises, actions en cours.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>Intégrations<\u002Fh4><p>Connexion avec tes outils : caisse, logiciels métier.... vue unifiée.<\u002Fp><\u002Fdiv>\n      <div class=\"cockpit-feat\"><h4>L'Indépendant<\u002Fh4><p>Communauté de restaurateurs et réseau d'experts sélectionnés.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TÉMOIGNAGES -->\n<section class=\"temoignages-section\">\n  <div class=\"temoignages-inner\">\n    <div class=\"temo-header\">\n      <div>\n        <span class=\"section-label reveal\">Ce qu'ils disent<\u002Fspan>\n        <h2 class=\"big-title temo-title reveal d1\">Des restaurants.<br><em>Des transformations réelles.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"temoignage reveal\">\n      <div class=\"temo-quote-block\">\n        <span class=\"temo-quote-mark\">\"<\u002Fspan>\n        <p class=\"temo-quote\">J'ai une base solide pour développer. Je suis en train de construire un deuxième établissement, avec une vision beaucoup plus claire.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"temo-details-row\">\n        <p>Avant de travailler avec Candice, on avait une carte très large, difficile à gérer au quotidien. Beaucoup de références, peu de lisibilité, et une rentabilité qu'on ne maîtrisait pas vraiment.<\u002Fp>\n        <p>On a tout retravaillé ensemble : l'offre, la structure de la carte, et la logique derrière. On a simplifié, clarifié, et surtout pris des décisions concrètes.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"temo-footer\">\n        <div class=\"temo-author\">\n          <div class=\"author-avatar\"><span>M<\u002Fspan><\u002Fdiv>\n          <div>\n            <div class=\"author-name\">Maïna<\u002Fdiv>\n            <div class=\"author-role\">Restaurant caribéen — Villeurbanne<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"temo-stats\">\n          <div class=\"stat-block\">\n            <span class=\"stat-number\">+3 000€<\u002Fspan>\n            <span class=\"stat-label\">CA mensuel<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stat-block\">\n            <span class=\"stat-number\">×2<\u002Fspan>\n            <span class=\"stat-label\">Établissements<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"temo-tags\">\n          <span class=\"temo-tag\">Menu Engineering<\u002Fspan>\n          <span class=\"temo-tag\">Structuration<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"temoignage reveal\">\n      <div class=\"temo-quote-block\">\n        <span class=\"temo-quote-mark\">\"<\u002Fspan>\n        <p class=\"temo-quote\">On prend des décisions beaucoup plus rapidement, avec une vision claire de l'impact.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"temo-details-row\">\n        <p>On savait qu'il y avait un sujet sur nos chiffres, mais on n'arrivait pas à identifier précisément où agir.<\u002Fp>\n        <p>Candice est rentrée dans le détail avec nous : offre, pricing, organisation. Pas juste des recommandations, on a travaillé concrètement sur les décisions. Résultat : +10€ de ticket moyen. Mais surtout, une vraie lecture de notre rentabilité.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"temo-footer\">\n        <div class=\"temo-author\">\n          <div class=\"author-avatar\"><span>LR<\u002Fspan><\u002Fdiv>\n          <div>\n            <div class=\"author-name\">Léa &amp; Romain<\u002Fdiv>\n            <div class=\"author-role\">Bistronomique<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"temo-stats\">\n          <div class=\"stat-block\">\n            <span class=\"stat-number\">+10€<\u002Fspan>\n            <span class=\"stat-label\">Ticket moyen<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"temo-tags\">\n          <span class=\"temo-tag\">Pilotage<\u002Fspan>\n          <span class=\"temo-tag\">Pricing<\u002Fspan>\n          <span class=\"temo-tag\">Rentabilité<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"temoignage reveal\">\n      <div class=\"temo-quote-block\">\n        <span class=\"temo-quote-mark\">\"<\u002Fspan>\n        <p class=\"temo-quote\">Elle n'est pas juste un regard extérieur. Elle est dedans avec nous.&nbsp;\nEt ça change complètement la manière dont on avance.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"temo-details-row\">\n        <p>On avait besoin de quelqu'un qui ne reste pas en surface. Quelqu'un qui comprenne vraiment comment ça tourne chez nous.<\u002Fp>\n        <p>Candice est venue plusieurs jours sur le terrain, avec l'équipe, dans le réel. Elle a structuré des choses très concrètes dans notre organisation, qu'on n'aurait pas mises en place seuls.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"temo-footer\">\n        <div class=\"temo-author\">\n          <div class=\"author-avatar\"><span>A<\u002Fspan><\u002Fdiv>\n          <div>\n            <div class=\"author-name\">Agnès<\u002Fdiv>\n            <div class=\"author-role\">La Cantine<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"temo-tags\">\n          <span class=\"temo-tag\">Immersion terrain<\u002Fspan>\n          <span class=\"temo-tag\">Structuration opérationnelle<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OFFRES -->\n<section class=\"offres-section grain\" style=\"position:relative;\">\n  <div class=\"offres-inner\">\n    <div class=\"offres-header\">\n      <span class=\"section-label section-label-dim reveal\">Comment travailler ensemble<\u002Fspan>\n      <h2 class=\"big-title big-title-light offres-title reveal d1\">Une formule<br><em>pour chaque étape.<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"offres-grid\">\n      <div class=\"offre-card reveal\">\n        <span class=\"offre-badge\">Structuration<\u002Fspan>\n        <h3 class=\"offre-title\">Cockpit &amp; Mise en place<\u002Fh3>\n        <p class=\"offre-desc\">Pour poser les bases du pilotage et repartir avec un système clair.<\u002Fp>\n        <div class=\"offre-divider\"><\u002Fdiv>\n        <ul class=\"offre-list\">\n          <li>Mise en place du Cockpit<\u002Fli>\n          <li>Structuration des indicateurs clés<\u002Fli>\n          <li>2 sessions de visio<\u002Fli>\n          <li>Suivi initial<\u002Fli>\n        <\u002Ful>\n        <a href=\"https://calendly.com/candiceo-strategie/decouverte\" class=\"offre-cta outline\" target=\"_blank\">En discuter<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"offre-card featured reveal d1\">\n        <span class=\"offre-badge\">Le plus choisi<\u002Fspan>\n        <h3 class=\"offre-title\">Bras Droit Opérationnel<\u002Fh3>\n        <p class=\"offre-desc\">Pour structurer et piloter dans la durée — terrain et stratégie mêlés.<\u002Fp>\n        <div class=\"offre-divider\"><\u002Fdiv>\n        <ul class=\"offre-list\">\n          <li>Terrain + distance<\u002Fli>\n          <li>Cockpit complet inclus<\u002Fli>\n          <li>Pilotage régulier<\u002Fli>\n          <li>Structuration organisation &amp; équipe<\u002Fli>\n          <li>Accompagnement des décisions stratégiques<\u002Fli>\n          <li>Disponibilité entre les sessions<\u002Fli>\n        <\u002Ful>\n        <span class=\"offre-note\">Engagement minimum : 6 mois<\u002Fspan>\n        <a href=\"https://calendly.com/candiceo-strategie/decouverte\" class=\"offre-cta filled\" target=\"_blank\">Prendre un appel<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"offre-card reveal d2\">\n        <span class=\"offre-badge\">Mission ciblée<\u002Fspan>\n        <h3 class=\"offre-title\">Intervention Terrain<\u002Fh3>\n        <p class=\"offre-desc\">Pour débloquer un sujet précis, rapidement et concrètement.<\u002Fp>\n        <div class=\"offre-divider\"><\u002Fdiv>\n        <ul class=\"offre-list\">\n          <li>Offre / carte<\u002Fli>\n          <li>Organisation interne<\u002Fli>\n          <li>Ouverture d'établissement<\u002Fli>\n          <li>Rentabilité<\u002Fli>\n          <li>Problème opérationnel ciblé<\u002Fli>\n        <\u002Ful>\n        <a href=\"https://calendly.com/candiceo-strategie/decouverte\" class=\"offre-cta outline\" target=\"_blank\">En discuter<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CE N'EST PAS POUR TOI -->\n<section class=\"notforyou-section grain\">\n  <div class=\"notforyou-inner\">\n    <div class=\"notforyou-header\">\n      <span class=\"section-label notforyou-eyebrow reveal\">Soyons clairs<\u002Fspan>\n      <h2 class=\"big-title big-title-light notforyou-title reveal d1\">Ce n'est pas<br><em>pour toi si&nbsp;<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"nfy-list\">\n      <div class=\"nfy-row reveal\">\n        <span class=\"nfy-index\">01<\u002Fspan>\n        <p class=\"nfy-text\">Tu veux uniquement des conseils rapides, sans t'impliquer dans la durée.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"nfy-row reveal d1\">\n        <span class=\"nfy-index\">02<\u002Fspan>\n        <p class=\"nfy-text\">Tu ne veux pas regarder tes chiffres en face.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"nfy-row reveal d2\">\n        <span class=\"nfy-index\">03<\u002Fspan>\n        <p class=\"nfy-text\">Tu refuses de structurer ton organisation.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"nfy-row reveal d3\">\n        <span class=\"nfy-index\">04<\u002Fspan>\n        <p class=\"nfy-text\">Tu cherches des résultats sans y mettre de l'implication de ton côté.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"faq-section\">\n  <div class=\"faq-inner\">\n    <div class=\"faq-header\">\n      <span class=\"section-label reveal\">Questions fréquentes<\u002Fspan>\n      <h2 class=\"big-title faq-title reveal d1\">Ce qu'on me<br><em>demande souvent.<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"faq-grid reveal\">\n      <div class=\"faq-card\" onclick=\"toggleFaqCard(this)\">\n        <div class=\"faq-q\"><span>Est-ce adapté si j'ai un seul restaurant ?<\u002Fspan><span class=\"faq-q-icon\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"faq-a\"><p>Oui. Le sujet reste le même : structurer pour mieux piloter, et se donner les bases pour aller plus loin.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-card\" onclick=\"toggleFaqCard(this)\">\n        <div class=\"faq-q\"><span>Et si j'ai plusieurs établissements ?<\u002Fspan><span class=\"faq-q-icon\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"faq-a\"><p>C'est souvent là que j'interviens — pour remettre une vision globale, de la cohérence, et un pilotage qui tient à l'échelle.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-card\" onclick=\"toggleFaqCard(this)\">\n        <div class=\"faq-q\"><span>Tu travailles à distance ou en présentiel ?<\u002Fspan><span class=\"faq-q-icon\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"faq-a\"><p>Les deux. Le terrain fait partie de ma façon de comprendre ton organisation. Le travail à distance — visio, Cockpit — assure la continuité entre les sessions.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-card\" onclick=\"toggleFaqCard(this)\">\n        <div class=\"faq-q\"><span>Combien de clients tu prends en même temps ?<\u002Fspan><span class=\"faq-q-icon\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"faq-a\"><p>Peu. Je limite volontairement le nombre pour garantir un vrai niveau d'implication — pas un accompagnement en mode abonnement automatique.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-card\" onclick=\"toggleFaqCard(this)\">\n        <div class=\"faq-q\"><span>Est-ce que je dois être très disponible ?<\u002Fspan><span class=\"faq-q-icon\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"faq-a\"><p>Un minimum, oui. On construit ensemble dans le réel — ça demande de l'implication des deux côtés.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-card\" onclick=\"toggleFaqCard(this)\">\n        <div class=\"faq-q\"><span>Comment savoir si c'est fait pour moi ?<\u002Fspan><span class=\"faq-q-icon\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"faq-a\"><p>C'est exactement pour ça que l'appel découverte existe. 30 minutes pour en parler, sans engagement.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA -->\n<section class=\"final-cta-section\">\n  <div class=\"final-cta-bg\"><\u002Fdiv>\n  <div class=\"final-cta-overlay\"><\u002Fdiv>\n  <div class=\"final-cta-inner\">\n    <h2 class=\"reveal\">Tu peux continuer<br>comme aujourd'hui.<br><em>Ou structurer pour<br>passer un vrai cap.<\u002Fem><\u002Fh2>\n    <p class=\"reveal d1\">Un appel de 30 minutes pour voir où tu en es<br>et ce qu'on peut construire ensemble.<\u002Fp>\n    <a href=\"https://calendly.com/candiceo-strategie/decouverte\" target=\"_blank\" class=\"cta-primary reveal d2\">\n      Réserver un appel stratégique\n    <\u002Fa>\n    <p class=\"final-cta-note reveal d3\">Je travaille avec un nombre limité de restaurateurs pour garantir un vrai niveau d'implication.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <p>Candice Obadia · Stratégie &amp; Opérations restaurant · Signature Resto © 2025<\u002Fp>\n  <p>Tous droits réservés<\u002Fp>\n<\u002Ffooter>\n\n<script>\n  function toggleFaqCard(card) {\n    const isOpen = card.classList.contains('open');\n    document.querySelectorAll('.faq-card').forEach(c => c.classList.remove('open'));\n    if (!isOpen) card.classList.add('open');\n  }\n\n  // Scroll reveal\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach(entry => {\n      if (entry.isIntersecting) {\n        entry.target.classList.add('visible');\n        observer.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.06, rootMargin:'0px 0px -30px 0px' });\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\n\n  // Hero parallax\n  const heroBg = document.getElementById('heroBg');\n  if (heroBg) {\n    window.addEventListener('scroll', () => {\n      const y = window.scrollY;\n      heroBg.style.transform = `scale(1.05) translateY(${y * 0.18}px)`;\n    }, { passive: true });\n    setTimeout(() => { heroBg.style.transform = 'scale(1)'; }, 100);\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
